# fly.toml — Blocks & Tables
# App name must be globally unique on Fly; change if taken.
app = "blocks-and-tables"
primary_region = "atl"

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
